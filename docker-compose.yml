services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backendfoot
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html  
    depends_on:
      - postgres
    command: php artisan serve --host=0.0.0.0 --port=8000

  
  postgres:
    image: postgres:17
    container_name: postgresfoot
    restart: always
    environment:
      POSTGRES_DB: academiefoot
      POSTGRES_USER: m7d
      POSTGRES_PASSWORD: 2003
    ports:
      - "2004:5432"
    volumes:
      - pgtables:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: mohamed@gmail.com
      PGADMIN_DEFAULT_PASSWORD: 2003
    ports:
      - "5050:80"
    depends_on:
      - postgres

  frontend:
    image: node:20
    container_name: frontendfoot
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  pgtables: